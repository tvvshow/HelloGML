services:
  glm-free-api:
    build: .
    container_name: glm-free-api
    restart: always
    ports:
      - "38412:38412"
    environment:
      - ADMIN_KEY=changeme
    volumes:
      - ./data/tokens.json:/app/tokens.json
      - ./data/apikeys.json:/app/apikeys.json
      - ./data/logs:/app/logs
